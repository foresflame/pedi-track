# fly.toml — PediTrack deployment configuration
# Docs: https://fly.io/docs/reference/configuration/

app      = "pedi-track"
primary_region = "mia"       # Miami — closest to Mexico

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "8080"
  DB_PATH  = "/data/db/peditrack.sqlite"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

# Persistent volume for SQLite — must be created with:
#   fly volumes create peditrack_data --size 1 --region mia
[[mounts]]
  source      = "peditrack_data"
  destination = "/data"
